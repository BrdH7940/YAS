name: recommendation service ci

on:
  push:
    branches: ["main"]
    paths:
      - "recommendation/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/recommendation-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "recommendation/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/recommendation-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -pl recommendation -am
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl recommendation -am -Dcheckstyle.output.file=recommendation-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/recommendation-checkstyle-result.xml'
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Recommendation-Service-Unit-Test-Results
          path: "recommendation/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f recommendation -Dsonar.organization=23122004 -Dsonar.projectKey=23122004_DevOps-Project01 -Dsonar.host.url=https://sonarcloud.io
      - name: Cache OWASP Dependency Check data
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: actions/cache@v4
        with:
          path: .dependency-check-data
          key: ${{ runner.os }}-dependency-check-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-
      - name: OWASP Dependency Check (attempt 1)
        id: owasp_scan_1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@1.1.0
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: 'yas'
          path: '.'
          format: 'HTML'
          out: 'reports'
          args: >
            --nvdDatafeed https://dependency-check.github.io/DependencyCheck_Builder/nvd_cache/
            --data /github/workspace/.dependency-check-data
      - name: OWASP Dependency Check (attempt 2)
        id: owasp_scan_2
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && steps.owasp_scan_1.outcome == 'failure' }}
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@1.1.0
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: 'yas'
          path: '.'
          format: 'HTML'
          out: 'reports'
          args: >
            --nvdDatafeed https://dependency-check.github.io/DependencyCheck_Builder/nvd_cache/
            --data /github/workspace/.dependency-check-data
      - name: Fail when OWASP scan retries are exhausted
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && steps.owasp_scan_1.outcome == 'failure' && steps.owasp_scan_2.outcome == 'failure' }}
        run: |
          echo "OWASP Dependency Check failed after 2 attempts."
          exit 1
      - name: Upload OWASP Dependency Check results
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        uses: actions/upload-artifact@master
        with:
          name: OWASP Dependency Check Report
          path: ${{github.workspace}}/reports
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/recommendation/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 80
          min-coverage-changed-files: 60
          title: 'Recommendation Coverage Report'
          update-comment: true
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./recommendation
          push: true
          tags: ghcr.io/nashtech-garage/yas-recommendation:latest